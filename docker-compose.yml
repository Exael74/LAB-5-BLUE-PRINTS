services:
  postgres:
    image: postgres:16-alpine
    container_name: blueprints-postgres
    environment:
      POSTGRES_DB: blueprints
      POSTGRES_USER: blueprints
      POSTGRES_PASSWORD: blueprints
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprints -d blueprints"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
