# Perfil 'postgres' (Actividad 2): activa la persistencia en PostgreSQL.
# Se limpia la exclusion de autoconfig para reactivar JPA/DataSource.
spring.autoconfigure.exclude=

# Conexion (ajusta host/credenciales o usa variables de entorno)
spring.datasource.url=${JDBC_URL:jdbc:postgresql://localhost:5432/blueprints}
spring.datasource.username=${DB_USER:blueprints}
spring.datasource.password=${DB_PASSWORD:blueprints}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
